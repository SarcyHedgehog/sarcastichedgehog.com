<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maze Tag Lobby</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@multisynq/client@latest/bundled/multisynq-client.min.js"></script>
  <script src="config.js"></script>
  <script src="maps.js"></script>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center py-10 px-4">
  <h1 class="text-4xl mb-6">Maze Tag 3D</h1>

  <div class="w-full max-w-md">
    <h2 class="text-xl mb-3">Create New Game</h2>

    <label for="mapSelect" class="block text-sm text-gray-300 mb-2">Map</label>
    <select id="mapSelect" class="w-full bg-gray-800 text-white p-3 rounded mb-3"></select>

    <label for="newRoomInput" class="block text-sm text-gray-300 mb-2">Room name</label>
    <input
      id="newRoomInput"
      type="text"
      maxlength="24"
      placeholder="Enter room name or leave blank for random"
      class="w-full bg-gray-800 text-white p-3 rounded mb-3"
    />

    <button id="startBtn" class="w-full bg-green-600 hover:bg-green-700 text-white text-lg py-3 rounded mb-8">
      🎮 Start New Game
    </button>

    <h2 class="text-xl mb-3">Join Existing Game</h2>

    <label for="roomCodeInput" class="block text-sm text-gray-300 mb-2">Room name</label>
    <div class="flex gap-2">
      <input
        id="roomCodeInput"
        type="text"
        maxlength="24"
        placeholder="Enter room name"
        class="flex-1 bg-gray-800 text-white p-3 rounded"
      />
      <button
        id="joinBtn"
        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded"
      >
        Join
      </button>
    </div>

    <p class="text-sm text-gray-400 mt-2">
      Everyone must use the same room name and the same map.
    </p>

    <div class="mt-6 p-3 rounded bg-gray-900 text-sm text-gray-300">
      <div><span class="text-gray-400">Selected map:</span> <span id="selectedMapLabel">—</span></div>
      <div><span class="text-gray-400">Session room used:</span> <span id="sessionPreview" class="font-mono">—</span></div>
    </div>
  </div>

  <script>
    const APP_ID = window.APP_CONFIG?.APP_ID || "io.multisynq.mazetag.default";
    const APP_NAME = window.APP_CONFIG?.APP_NAME || "mazetag";

    function generateRoomCode() {
      return Array.from({ length: 5 }, () =>
        String.fromCharCode(65 + Math.floor(Math.random() * 26))
      ).join("");
    }

    function populateMapList() {
      const select = document.getElementById("mapSelect");
      select.innerHTML = "";

      const maps = Array.isArray(window.MAZE_MAPS) ? window.MAZE_MAPS : [];

      if (maps.length === 0) {
        const option = document.createElement("option");
        option.value = "map1";
        option.textContent = "map1";
        select.appendChild(option);
        return;
      }

      maps.forEach(map => {
        const option = document.createElement("option");
        option.value = map.id;
        option.textContent = map.title || map.id;
        select.appendChild(option);
      });
    }

    function normaliseRoomName(input) {
      return input
        .trim()
        .replace(/\s+/g, "-")
        .replace(/[^a-zA-Z0-9\-_]/g, "")
        .slice(0, 24);
    }

    function getSelectedMap() {
      const select = document.getElementById("mapSelect");
      return select?.value || "map1";
    }

    function buildSessionRoom(baseRoom, mapId) {
      return `${baseRoom}_${mapId}`;
    }

    function getCurrentPreviewRoom() {
      const raw = document.getElementById("newRoomInput").value;
      const baseRoom = normaliseRoomName(raw) || "ABCDE";
      const map = getSelectedMap();
      return buildSessionRoom(baseRoom, map);
    }

    function updatePreview() {
      const map = getSelectedMap();
      const mapLabel = document.getElementById("selectedMapLabel");
      const preview = document.getElementById("sessionPreview");

      mapLabel.textContent = map;
      preview.textContent = getCurrentPreviewRoom();
    }

    function goToRoom(baseRoom) {
      const map = getSelectedMap();
      const combinedRoom = buildSessionRoom(baseRoom, map);

      window.location.href =
        `mazetag.html?room=${encodeURIComponent(combinedRoom)}&map=${encodeURIComponent(map)}`;
    }

    document.getElementById("startBtn").addEventListener("click", () => {
      const input = document.getElementById("newRoomInput");
      const typedRoom = normaliseRoomName(input.value);
      const room = typedRoom || generateRoomCode();
      goToRoom(room);
    });

    document.getElementById("joinBtn").addEventListener("click", () => {
      const input = document.getElementById("roomCodeInput");
      const baseRoom = normaliseRoomName(input.value);

      if (!baseRoom) {
        alert("Please enter a room name.");
        return;
      }

      goToRoom(baseRoom);
    });

    document.getElementById("newRoomInput").addEventListener("input", updatePreview);

    document.getElementById("newRoomInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        document.getElementById("startBtn").click();
      }
    });

    document.getElementById("roomCodeInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        document.getElementById("joinBtn").click();
      }
    });

    document.getElementById("mapSelect").addEventListener("change", updatePreview);

    populateMapList();
    updatePreview();

    console.log("MazeTag lobby ready", { APP_ID, APP_NAME });
  </script>
</body>
</html>
